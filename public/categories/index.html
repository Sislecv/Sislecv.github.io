<script>
    document.addEventListener('DOMContentLoaded', function() {
        var sw = document.getElementById('theme-switch');
        if (!sw) return;
        var key = 'StackColorScheme';
        var val = localStorage.getItem(key) || 'auto';
        var dark = val === 'dark' || (val === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        sw.checked = dark;
        sw.addEventListener('change', function() {
            var isDark = sw.checked;
            localStorage.setItem(key, isDark ? 'dark' : 'light');
            document.documentElement.dataset.scheme = isDark ? 'dark' : 'light';
        });
    });
</script>
